name: Update and Build Flatpak

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Build the current manifest version without checking for updates.'
        type: boolean
        default: false
      force_version:
        description: 'Force a specific version (e.g. 1.1.5-1). Leave empty for auto-detect.'
        required: false

permissions:
  contents: write

jobs:
  # ── 1. Detect if there is a new upstream release ──────────────────────────
  check:
    name: Check for new version
    runs-on: ubuntu-latest
    # Set repo variable WEEKLY_BUILD=false to disable scheduled runs once the
    # app is live on Flathub (flatpak-external-data-checker takes over there).
    # Manual workflow_dispatch runs are never affected by this flag.
    if: github.event_name != 'schedule' || vars.WEEKLY_BUILD != 'false'
    outputs:
      new_version: ${{ steps.detect.outputs.new_version }}
      version:     ${{ steps.detect.outputs.version }}
      url:         ${{ steps.detect.outputs.url }}
      sha256:      ${{ steps.detect.outputs.sha256 }}
      size:        ${{ steps.detect.outputs.size }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect latest version
        id: detect
        run: |
          MANIFEST=io.github.Okazakee.ProtonAuthenticator.yml
          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          FORCE_VERSION="${{ github.event.inputs.force_version }}"

          # ── force_build: skip version check, build whatever is in the manifest ──
          if [ "$FORCE_BUILD" = "true" ]; then
            VERSION=$(grep -oP '(?<=ProtonAuthenticator-)[\d.]+-\d+(?=\.x86_64\.rpm)' "$MANIFEST" | head -1)
            URL=$(grep -oP '(?<=url: )https://proton\.me/download/authenticator/linux/[^\s]+' "$MANIFEST" | head -1)
            SHA256=$(grep -oP '(?<=sha256: )[a-f0-9]{64}' "$MANIFEST" | head -1)
            SIZE=$(grep -oP '(?<=size: )[0-9]+' "$MANIFEST" | head -1)
            echo "Force build: using manifest version $VERSION"
            echo "new_version=true"  >> "$GITHUB_OUTPUT"
            echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
            echo "url=$URL"         >> "$GITHUB_OUTPUT"
            echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"
            echo "size=$SIZE"       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── normal path: detect upstream version ──────────────────────────────
          if [ -n "$FORCE_VERSION" ]; then
            VERSION="$FORCE_VERSION"
            URL="https://proton.me/download/authenticator/linux/ProtonAuthenticator-${VERSION}.x86_64.rpm"
          else
            eval "$(python3 scripts/check-version.py)"
            if [ -z "$VERSION" ]; then
              echo "::error::Could not detect latest version from Proton version JSON."
              exit 1
            fi
          fi

          CURRENT=$(grep -oP '(?<=ProtonAuthenticator-)[\d.]+-\d+(?=\.x86_64\.rpm)' "$MANIFEST" | head -1)
          echo "Latest:  $VERSION"
          echo "Current: $CURRENT"

          if [ "$VERSION" = "$CURRENT" ] && [ -z "$FORCE_VERSION" ]; then
            echo "Already up to date."
            echo "new_version=false" >> "$GITHUB_OUTPUT"
          else
            curl -fsSL -o /tmp/ProtonAuthenticator.rpm "$URL"
            SHA256=$(sha256sum /tmp/ProtonAuthenticator.rpm | awk '{print $1}')
            ACTUAL_SIZE=$(wc -c < /tmp/ProtonAuthenticator.rpm)

            echo "new_version=true"     >> "$GITHUB_OUTPUT"
            echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
            echo "url=$URL"            >> "$GITHUB_OUTPUT"
            echo "sha256=$SHA256"      >> "$GITHUB_OUTPUT"
            echo "size=$ACTUAL_SIZE"   >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Update manifest, build bundle, upload artifact ────────────────────
  build:
    name: Build Flatpak
    needs: check
    if: needs.check.outputs.new_version == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update manifest
        env:
          VERSION: ${{ needs.check.outputs.version }}
          URL:     ${{ needs.check.outputs.url }}
          SHA256:  ${{ needs.check.outputs.sha256 }}
          SIZE:    ${{ needs.check.outputs.size }}
        run: |
          sed -i "s|url: https://proton\.me/download/authenticator/linux/.*\.rpm|url: ${URL}|" \
            io.github.Okazakee.ProtonAuthenticator.yml
          sed -i "s|sha256: [a-f0-9]\{64\}|sha256: ${SHA256}|" \
            io.github.Okazakee.ProtonAuthenticator.yml
          sed -i "s|size: [0-9]\+|size: ${SIZE}|" \
            io.github.Okazakee.ProtonAuthenticator.yml
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<release version=\"[^\"]*\" date=\"[^\"]*\">|<release version=\"${VERSION%-*}\" date=\"${TODAY}\">|" \
            io.github.Okazakee.ProtonAuthenticator.metainfo.xml

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder libarchive-tools
          sudo flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --system -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Download RPM and prepare CI build manifest
        env:
          URL: ${{ needs.check.outputs.url }}
        run: |
          curl -fsSL -o ProtonAuthenticator.rpm "$URL"
          bsdtar -xf ProtonAuthenticator.rpm usr/bin/proton-authenticator
          python3 scripts/patch-manifest-for-ci.py

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ProtonAuthenticator-${{ needs.check.outputs.version }}.flatpak
          manifest-path: ci-build.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProtonAuthenticator-${{ needs.check.outputs.version }}
          path: ProtonAuthenticator-${{ needs.check.outputs.version }}.flatpak
          retention-days: 90

      - name: Commit manifest and metainfo updates
        if: github.event.inputs.force_build != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add io.github.Okazakee.ProtonAuthenticator.yml io.github.Okazakee.ProtonAuthenticator.metainfo.xml
          git commit -m "chore: update to Proton Authenticator ${{ needs.check.outputs.version }} [skip ci]"
          git push
